<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Search App</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #a18cd1);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }

        /* MAIN CARD */
        .container {
            background: #ffffffcc;
            backdrop-filter: blur(10px);
            padding: 25px;
            width: 360px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(255, 105, 180, 0.3);
            text-align: center;
            transition: 0.3s;
        }

        .container:hover {
            transform: translateY(-5px) scale(1.02);
        }

        /* TITLE */
        h1 {
            margin-bottom: 15px;
            color: #ff4da6;
            font-weight: 600;
        }

        /* INPUT */
        input {
            width: 80%;
            padding: 10px;
            border: none;
            border-radius: 10px;
            outline: none;
            margin-bottom: 10px;
            font-size: 14px;
            background: #ffe6f0;
            color: #333;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        input::placeholder {
            color: #ff80bf;
        }

        input:focus {
            border: 2px solid #ff4da6;
        }

        /* BUTTONS */
        button {
            padding: 8px 15px;
            border: none;
            border-radius: 20px;
            background: linear-gradient(45deg, #ff4da6, #a18cd1);
            color: white;
            cursor: pointer;
            margin: 5px;
            font-size: 14px;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(255, 77, 166, 0.4);
        }

        /* CLEAR BUTTON */
        .clear-btn {
            background: linear-gradient(45deg, #ff6a6a, #ffb347);
        }

        .clear-btn:hover {
            box-shadow: 0 5px 15px rgba(255, 100, 100, 0.4);
        }

        /* RESULT BOX */
        #result {
            margin-top: 15px;
            padding: 10px;
            background: #ffe6f0;
            border-radius: 12px;
            font-size: 14px;
        }

        /* LIST */
        ul {
            list-style: none;
            padding: 0;
            margin-top: 10px;
        }

        li {
            background: #f9d6ff;
            padding: 8px;
            margin: 5px 0;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        li:hover {
            background: #ffb3ec;
            transform: translateX(6px) rotate(-1deg);
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🌤 Weather App</h1>

        <input type="text" id="cityInput" placeholder="Enter city name">
        <br>
        <button onclick="getWeather()">Search</button>

        <div id="result"></div>

        <h3>Recent Searches</h3>
        <ul id="history"></ul>

        <button class="clear-btn" onclick="clearHistory()">Clear History</button>
    </div>

    <script src="script.js"></script>

</body>

</html>
